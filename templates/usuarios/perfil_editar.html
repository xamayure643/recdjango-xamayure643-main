{% extends 'base.html' %}

{% block title %}Editar Perfil - YaListas{% endblock %}

{% block content %}
    <h1>Editar Perfil</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit">Guardar Cambios</button>
        <a href="{% url 'usuarios:perfil_detalle' pk=user.pk %}">Cancelar</a>
    </form>
{% endblock %}
